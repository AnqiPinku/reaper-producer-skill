name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate skill package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill structure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path("skills/reaper-producer")
          required_files = [
              root / "SKILL.md",
              root / "agents/openai.yaml",
              root / "references/evals.md",
              root / "references/instrument-loading.md",
              root / "references/production-semantics.md",
              root / "references/tool-map.md",
              root / "scripts/check_reaper_mcp.py",
              root / "scripts/insert_instrument_template.py",
              root / "scripts/scan_reaper_templates.py",
              root / "scripts/validate_instrument_registry.py",
              Path("examples/instruments.example.json"),
              Path("schemas/instrument-registry.schema.json"),
          ]
          missing = [str(path) for path in required_files if not path.is_file()]
          if missing:
              print("Missing required files:")
              for path in missing:
                  print(f"  - {path}")
              sys.exit(1)

          text = (root / "SKILL.md").read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              print("SKILL.md must start with YAML frontmatter.")
              sys.exit(1)
          end = text.find("\n---\n", 4)
          if end == -1:
              print("SKILL.md frontmatter is not closed.")
              sys.exit(1)

          frontmatter = text[4:end].strip().splitlines()
          fields = {}
          for line in frontmatter:
              if ":" in line and not line.startswith((" ", "\t")):
                  key, value = line.split(":", 1)
                  fields[key.strip()] = value.strip().strip('"').strip("'")

          if fields.get("name") != "reaper-producer":
              print("SKILL.md frontmatter name must be reaper-producer.")
              sys.exit(1)
          description = fields.get("description", "")
          if len(description) < 80:
              print("SKILL.md description is too short for reliable triggering.")
              sys.exit(1)
          if not re.fullmatch(r"[a-z0-9-]{1,64}", fields["name"]):
              print("Skill name must use lowercase letters, digits, and hyphens.")
              sys.exit(1)
          body = text[end + 5 :].strip()
          if not body:
              print("SKILL.md body must not be empty.")
              sys.exit(1)

          openai_yaml = (root / "agents/openai.yaml").read_text(encoding="utf-8")
          for key in ("display_name:", "short_description:", "default_prompt:"):
              if key not in openai_yaml:
                  print(f"agents/openai.yaml is missing {key}")
                  sys.exit(1)

          print("Skill structure is valid.")
          PY

      - name: Compile Python helper scripts
        run: python -m compileall skills/reaper-producer/scripts

      - name: Validate example instrument registry
        run: python skills/reaper-producer/scripts/validate_instrument_registry.py examples/instruments.example.json

      - name: Scan for local paths and secret markers
        shell: bash
        run: |
          python - <<'PY'
          """CI guard: fail if any real local filesystem path or secret marker
          leaked into the repository.

          It detects *patterns* (drive-letter paths, Unix home paths, token
          prefixes) rather than hard-coding anyone's private paths, so the guard
          itself never has to spell out what it is hiding. Generic documentation
          placeholders (``C:\\path\\to\\...``, ``C:\\Users\\<user>\\...``) are
          explicitly allowed -- listing those reveals nothing private.
          """
          from pathlib import Path
          import re
          import sys

          # Patterns that indicate a real local path or a leaked secret.
          PATTERNS = [
              # Windows absolute path: drive letter + ":\" + something.
              # - (?<![A-Za-z0-9]) so we don't match "dir:\n" / "foo:\bar" inside words.
              # - the tail allows backslashes and "<...>" so JSON-escaped "C:\\a\\b" and
              #   "<user>" placeholders are captured whole and can be matched against the
              #   allow-list; it stops at quotes / whitespace. Real paths never contain
              #   "<>", so a genuine leak still fails the allow-list check below.
              (re.compile(r"(?<![A-Za-z0-9])[A-Za-z]:\\[^\s\"']*"), "windows-path"),
              # Unix home directories with a concrete user name.
              (re.compile(r"/(?:Users|home)/[^\s\"'<>/]+"), "unix-home"),
              # GitHub token / PAT markers.
              (re.compile(r"gh[pousr]_[A-Za-z0-9]"), "github-token"),
              (re.compile(r"github_pat_"), "github-pat"),
              (re.compile(r"GITHUB_PERSONAL_ACCESS_TOKEN"), "github-token-env"),
          ]

          # Known-legitimate documentation placeholders (generic, non-private).
          # A path match is ignored when, after normalising "\\" -> "\" and
          # lower-casing, it equals one of these or sits directly beneath it.
          ALLOWED_PATHS = (
              r"c:\path\to",
              r"c:\mcp\reaper-mcp-v2",
              r"c:\users\you",
              r"c:\users\me",
              r"c:\users\<user>",
              r"c:\users\<username>",
              r"c:\users\<your-user>",
              r"/users/<user>",
              r"/users/you",
              r"/users/me",
              r"/home/<user>",
              r"/home/you",
              r"/home/me",
          )

          SKIP_DIR_PARTS = {".git", "__pycache__", ".pytest_cache", ".venv", "venv", "env"}


          def normalise(match: str) -> str:
              return match.replace("\\\\", "\\").rstrip("\\").lower()


          def is_allowed(match: str) -> bool:
              norm = normalise(match)
              for allowed in ALLOWED_PATHS:
                  if norm == allowed or norm.startswith(allowed + "\\") or norm.startswith(allowed + "/"):
                      return True
              return False


          def main() -> int:
              hits = []
              for path in sorted(Path(".").rglob("*")):
                  if not path.is_file():
                      continue
                  if any(part in SKIP_DIR_PARTS for part in path.parts):
                      continue
                  # Don't scan this guard (its own patterns/allow-list aren't paths).
                  if path.name == "ci.yml":
                      continue
                  try:
                      text = path.read_text(encoding="utf-8")
                  except (UnicodeDecodeError, OSError):
                      continue
                  for pattern, label in PATTERNS:
                      for m in pattern.findall(text):
                          if label in ("windows-path", "unix-home") and is_allowed(m):
                              continue
                          hits.append((str(path), label, m))

              if hits:
                  print("Forbidden local paths or secret markers found:")
                  for path, label, m in hits:
                      print(f"  {path}: [{label}] {m}")
                  return 1
              print("No forbidden local paths or secret markers found.")
              return 0


          if __name__ == "__main__":
              sys.exit(main())
          PY
